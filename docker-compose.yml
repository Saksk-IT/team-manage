services:
  app:
    build: .
    container_name: team-manage-app
    ports:
      - "127.0.0.1:${APP_PORT:-8008}:${APP_PORT:-8008}"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    restart: always
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/team_manage.db
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8008} --proxy-headers --forwarded-allow-ips='*'"
